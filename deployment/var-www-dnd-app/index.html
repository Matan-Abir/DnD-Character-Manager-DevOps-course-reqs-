<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Character Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚔️ Dungeons & Dragons Character Manager</h1>
            <p>Track and manage your D&D 5E characters</p>
        </header>

        <nav class="controls">
            <button id="btnNewCharacter" class="btn btn-primary">+ New Character</button>
            <button id="btnDiceRoll" class="btn btn-secondary">🎲 Roll Dice</button>
            <input type="text" id="searchBox" placeholder="Search characters..." class="search-box">
            <div class="menu-dropdown">
                <button id="btnMenu" class="btn btn-menu">⋮ Menu</button>
                <div id="menuDropdown" class="dropdown-content">
                    <button id="btnLoadDummy">📚 Load Sample Data</button>
                </div>
            </div>
        </nav>

        <div id="notificationsContainer" class="notifications-container"></div>
        <div id="charactersList" class="characters-grid"></div>
    </div>

    <!-- Modal: New/Edit Character -->
    <div id="characterModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Create New Character</h2>
            
            <form id="characterForm">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="charName" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Level</label>
                        <input type="number" id="charLevel" min="1" max="20" value="1" required>
                    </div>
                    <div class="form-group">
                        <label>Race</label>
                        <input type="text" id="charRace" required>
                    </div>
                    <div class="form-group">
                        <label>Class</label>
                        <input type="text" id="charClass" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Ability Scores</label>
                    <div class="stats-input">
                        <div class="stat-row">
                            <div class="stat-input-group">
                                <label>💪 STR</label>
                                <input type="number" id="statStr" min="1" max="20" value="10" required>
                                <span class="modifier" id="modStr">(+0)</span>
                            </div>
                            <div class="stat-input-group">
                                <label>🏃 DEX</label>
                                <input type="number" id="statDex" min="1" max="20" value="10" required>
                                <span class="modifier" id="modDex">(+0)</span>
                            </div>
                            <div class="stat-input-group">
                                <label>❤️ CON</label>
                                <input type="number" id="statCon" min="1" max="20" value="10" required>
                                <span class="modifier" id="modCon">(+0)</span>
                            </div>
                        </div>
                        <div class="stat-row">
                            <div class="stat-input-group">
                                <label>🧠 INT</label>
                                <input type="number" id="statInt" min="1" max="20" value="10" required>
                                <span class="modifier" id="modInt">(+0)</span>
                            </div>
                            <div class="stat-input-group">
                                <label>👁️ WIS</label>
                                <input type="number" id="statWis" min="1" max="20" value="10" required>
                                <span class="modifier" id="modWis">(+0)</span>
                            </div>
                            <div class="stat-input-group">
                                <label>✨ CHA</label>
                                <input type="number" id="statCha" min="1" max="20" value="10" required>
                                <span class="modifier" id="modCha">(+0)</span>
                            </div>
                        </div>
                    </div>
                    <button type="button" id="btnRandomizeStats" class="btn btn-small">🎲 Randomize Stats</button>
                </div>

                <div class="form-group">
                    <label>Inventory Items</label>
                    <div id="inventoryList"></div>
                    <div class="inventory-input">
                        <input type="text" id="newInventoryItem" placeholder="Add item...">
                        <button type="button" id="btnAddItem" class="btn btn-small">Add</button>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Character</button>
                    <button type="button" id="btnCancel" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Character Details -->
    <div id="detailsModal" class="modal">
        <div class="modal-content modal-large">
            <span class="close">&times;</span>
            <div id="charDetails"></div>
            <div class="modal-actions">
                <button id="btnEditFromDetails" class="btn btn-primary">Edit</button>
                <button id="btnDeleteFromDetails" class="btn btn-danger">Delete</button>
                <button id="btnCloseDetails" class="btn btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <!-- Modal: Delete Confirmation -->
    <div id="deleteModal" class="modal">
        <div class="modal-content modal-small">
            <span class="close">&times;</span>
            <h2>Delete Character?</h2>
            <p id="deleteMessage"></p>
            <div class="modal-actions">
                <button id="btnConfirmDelete" class="btn btn-danger">Delete</button>
                <button id="btnCancelDelete" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Modal: Dice Roll -->
    <div id="diceModal" class="modal">
        <div class="modal-content modal-small">
            <span class="close">&times;</span>
            <h2>Roll a D6</h2>
            <div id="diceResult" class="dice-result"></div>
            <button id="btnRollAgain" class="btn btn-primary">Roll Again</button>
        </div>
    </div>

    <!-- Modal: Load Sample Data Warning -->
    <div id="loadDataWarningModal" class="modal">
        <div class="modal-content modal-small">
            <span class="close">&times;</span>
            <h2>⚠️ Load Sample Data</h2>
            <p>This will <strong>delete all existing characters</strong> and load 3 sample characters. This action cannot be undone.</p>
            <div class="modal-actions">
                <button id="btnConfirmLoadData" class="btn btn-danger">Load Sample Data</button>
                <button id="btnCancelLoadData" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
