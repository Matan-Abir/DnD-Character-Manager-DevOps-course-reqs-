<VirtualHost *:80>
    ServerName dndapp.com
    ServerAlias *

    WSGIDaemonProcess dnd python-path=/var/www/dnd-app user=www-data group=www-data threads=5
    WSGIProcessGroup dnd
    WSGIScriptAlias / /var/www/dnd-app/wsgi.py
    WSGIScriptReloading On

    <Directory /var/www/dnd-app>
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/dnd-error.log
    CustomLog ${APACHE_LOG_DIR}/dnd-access.log combined
</VirtualHost>
